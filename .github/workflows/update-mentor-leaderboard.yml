name: Update Mentor Leaderboard

on:
  schedule:
    - cron: "0 */12 * * *"
  workflow_dispatch:

permissions:
  contents: write
  pull-requests: write

concurrency:
  group: update-mentor-leaderboard
  cancel-in-progress: false

jobs:
  update:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd #v6.0.2

      - name: Generate leaderboard
        run: node .github/scripts/generate-mentor-leaderboard.js

      - name: Create Pull Request
        uses: peter-evans/create-pull-request@5f6978faf089d4d20b00c7766989d076bb2fc7f1 #v8.1.1
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          commit-message: "chore: update mentor leaderboard"
          title: "chore: update mentor leaderboard"
          body: |
            Automated mentor leaderboard update.
          branch: automation/mentor-leaderboard
          delete-branch: true
          signoff: true
