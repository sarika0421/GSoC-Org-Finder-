name: 🔁 Duplicate PR Guard

on:
  pull_request_target:
    types:
      - opened
      - reopened
      - ready_for_review
      - synchronize

permissions:
  pull-requests: write
  issues: write

concurrency:
  group: duplicate-pr-${{ github.event.pull_request.number }}
  cancel-in-progress: true

jobs:
  detect-duplicate-pr:
    name: Detect Duplicate PRs
    runs-on: ubuntu-latest

    if: |
      github.event.pull_request.draft == false &&
      github.actor != 'github-actions[bot]'

    steps:
      - name: Analyze Pull Request
        uses: actions/github-script@3a2844b7e9c422d3c10d287c895573f7108da1b3 #v9.0.0
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            const pr = context.payload.pull_request;

            const owner = context.repo.owner;
            const repo = context.repo.repo;

            const prNumber = pr.number;
            const username = pr.user.login;

            // Ignore bots
            if (
              pr.user.type === 'Bot' ||
              username.endsWith('[bot]')
            ) {
              core.info('Skipping bot PR');
              return;
            }

            const title =
              (pr.title || '').trim();

            const body =
              (pr.body || '').trim();

            // Ignore weak PRs
            if (title.length < 10) {
              core.info('Title too short');
              return;
            }

            const STOPWORDS = new Set([
              'the',
              'a',
              'an',
              'is',
              'are',
              'to',
              'of',
              'for',
              'on',
              'in',
              'and',
              'with',
              'fix',
              'feature',
              'issue',
              'bug',
              'update',
              'improve',
              'support',
              'change',
              'pr',
              'pull',
              'request'
            ]);

            function normalize(str) {
              return str
                .toLowerCase()
                .replace(/[^a-z0-9\s]/g, ' ')
                .replace(/\s+/g, ' ')
                .trim();
            }

            function tokenize(str) {
              return normalize(str)
                .split(' ')
                .filter(Boolean)
                .filter(
                  word =>
                    !STOPWORDS.has(word)
                );
            }

            function similarity(a, b) {

              const setA =
                new Set(tokenize(a));

              const setB =
                new Set(tokenize(b));

              if (
                setA.size === 0 ||
                setB.size === 0
              ) {
                return 0;
              }

              const intersection =
                [...setA].filter(
                  x => setB.has(x)
                );

              const union =
                new Set([
                  ...setA,
                  ...setB
                ]);

              return (
                intersection.length /
                union.size
              );
            }

            function commonKeywordCount(a, b) {

              const setA =
                new Set(tokenize(a));

              const setB =
                new Set(tokenize(b));

              return [...setA]
                .filter(x => setB.has(x))
                .length;
            }

            // Fetch open PRs
            const prs =
              await github.paginate(
                github.rest.pulls.list,
                {
                  owner,
                  repo,
                  state: 'open',
                  sort: 'created',
                  direction: 'desc',
                  per_page: 100
                }
              );

            let duplicate = null;
            let bestScore = 0;

            for (const existing of prs) {

              if (
                existing.number === prNumber ||
                existing.draft
              ) {
                continue;
              }

              const existingTitle =
                existing.title || '';

              const existingBody =
                existing.body || '';

              const titleScore =
                similarity(
                  title,
                  existingTitle
                );

              const bodyScore =
                similarity(
                  body,
                  existingBody
                );

              const keywordOverlap =
                commonKeywordCount(
                  title,
                  existingTitle
                );

              const finalScore =
                (titleScore * 0.75) +
                (bodyScore * 0.25);

              core.info(
                `PR #${existing.number} score=${finalScore.toFixed(2)} overlap=${keywordOverlap}`
              );

              // Conservative thresholds
              if (
                finalScore >= 0.78 &&
                keywordOverlap >= 3
              ) {

                if (finalScore > bestScore) {

                  bestScore = finalScore;
                  duplicate = existing;

                }

              }

            }

            if (!duplicate) {
              core.info(
                'No duplicate PR detected'
              );

              // Remove stale label if present
              try {
                await github.rest.issues.removeLabel({
                  owner,
                  repo,
                  issue_number: prNumber,
                  name: 'possible-duplicate-pr'
                });
              } catch {}

              return;
            }

            const MARKER =
              '<!-- duplicate-pr-guard -->';

            const similarityPercent =
              Math.round(bestScore * 100);

            const commentBody = [
              MARKER,
              '',
              '## 🔁 Possible Duplicate PR',
              '',
              `Hi @${username}, this PR appears similar to:`,
              '',
              `➡️ #${duplicate.number}`,
              '',
              `Similarity confidence: **${similarityPercent}%**`,
              '',
              'Please verify whether the changes overlap before continuing.',
              '',
              'If this PR is substantially different, you may clarify the distinction.',
              '',
              '_No automatic closure was performed._'
            ].join('\n');

            const comments =
              await github.paginate(
                github.rest.issues.listComments,
                {
                  owner,
                  repo,
                  issue_number: prNumber,
                  per_page: 50
                }
              );

            const existingComment =
              comments.find(
                c =>
                  c.user.type === 'Bot' &&
                  c.body.includes(MARKER)
              );

            if (existingComment) {

              if (
                existingComment.body.trim() ===
                commentBody.trim()
              ) {

                core.info(
                  'Comment already exists'
                );

              } else {

                await github.rest.issues.updateComment({
                  owner,
                  repo,
                  comment_id:
                    existingComment.id,
                  body: commentBody
                });

                core.info(
                  'Updated duplicate comment'
                );

              }

            } else {

              await github.rest.issues.createComment({
                owner,
                repo,
                issue_number: prNumber,
                body: commentBody
              });

              core.info(
                'Created duplicate comment'
              );

            }

            // Add label
            try {

              await github.rest.issues.addLabels({
                owner,
                repo,
                issue_number: prNumber,
                labels: ['possible-duplicate-pr']
              });

            } catch (e) {

              core.info(
                `Label error: ${e.message}`
              );

            }

            core.info(
              `Potential duplicate detected: #${prNumber} -> #${duplicate.number}`
            );
