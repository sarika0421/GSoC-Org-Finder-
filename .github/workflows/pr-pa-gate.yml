name: 🔑 Stage 3 - Maintainer Final Gate

on:
  pull_request_review:
    types:
      - submitted
      - dismissed
  pull_request_target:
    types:
      - labeled
      - unlabeled
      - synchronize
      - reopened
      - ready_for_review

permissions:
  pull-requests: write
  issues: write
  contents: read

concurrency:
  group: pa-final-gate-${{ github.event.pull_request.number || github.event.review.pull_request.number }}
  cancel-in-progress: true

jobs:
  pa-gate:
    name: Stage 3 - Maintainer Gate
    runs-on: ubuntu-latest
    if: |
      !github.event.pull_request.draft

    steps:
      - name: Evaluate Maintainer Approval
        uses: actions/github-script@3a2844b7e9c422d3c10d287c895573f7108da1b3 #v9.0.0
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            const MAINTAINER = 's3dfx-cyber';

            const owner = context.repo.owner;
            const repo = context.repo.repo;
            const pr = context.payload.pull_request ||
                       (context.payload.review && context.payload.review.pull_request);

            if (!pr) {
              core.info('No PR context found.');
              return;
            }

            const prNumber = pr.number;

            const { data: labelData } = await github.rest.issues.listLabelsOnIssue({
              owner, repo, issue_number: prNumber
            });
            const labels = labelData.map(l => l.name.toLowerCase());

            const hasLabel = (name) => labels.includes(name.toLowerCase());

            const stage1Complete = hasLabel('stage-1-approved');
            const isNsoc = hasLabel('nsoc26');
            const stage2Complete = isNsoc || hasLabel('mentor-approved') ||
                                  hasLabel('review-approved') ||
                                  hasLabel('gssoc-mentor-approved');

            async function addLabel(label) {
              try {
                await github.rest.issues.addLabels({
                  owner, repo, issue_number: prNumber, labels: [label]
                });
              } catch (e) { core.warning(`Failed adding label '${label}': ${e?.message || e}`); }
            }

            async function removeLabel(label) {
              try {
                await github.rest.issues.removeLabel({
                  owner, repo, issue_number: prNumber, name: label
                });
              } catch (e) { core.info(`Label '${label}' may not exist`); }
            }

            if (!stage1Complete || !stage2Complete) {
              core.info('Stage 1 or Stage 2 not complete. Stage 3 blocked.');
              await removeLabel('pa-approved');
              await removeLabel('merge-ready');
              return;
            }

            if (!hasLabel('stage-3-maintainer-review')) {
              await addLabel('stage-3-maintainer-review');
              try {
                await github.rest.pulls.requestReviewers({
                  owner, repo, pull_number: prNumber, reviewers: ['S3DFX-CYBER']
                });
                core.info('Requested maintainer @S3DFX-CYBER for Stage 3 review');
              } catch (err) {
                core.warning(`Failed requesting maintainer review: ${err?.message || err}`);
              }
            }

            const reviews = await github.paginate(
              github.rest.pulls.listReviews,
              { owner, repo, pull_number: prNumber }
            );

            const latestReviews = new Map();
            for (const review of reviews) {
              latestReviews.set(review.user.login.toLowerCase(), review);
            }

            const maintainerReview = latestReviews.get(MAINTAINER);
            const maintainerApproved = maintainerReview && maintainerReview.state === 'APPROVED';

            if (!maintainerApproved) {
              core.info('Waiting for maintainer @S3DFX-CYBER approval.');
              await removeLabel('pa-approved');
              await removeLabel('merge-ready');
              return;
            }

            core.info('Maintainer @S3DFX-CYBER has approved. PR is merge-ready.');
            await addLabel('pa-approved');
            await addLabel('merge-ready');

            if (hasLabel('needs-stage-1-fixes')) {
              await removeLabel('needs-stage-1-fixes');
            }
